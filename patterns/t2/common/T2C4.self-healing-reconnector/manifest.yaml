id: T2C4.self-healing-reconnector
name: Self-Healing Reconnector
tech_level: 2
rarity: common
mrl: 7
summary: >
  Use a watcher and timer fallback to reconnect flaky resources without rebooting the whole machine.
provides:
  - bounded_reconnect_loop
requires:
  - C1.service-capsule
  - C2.persistent-tick
  - C5.failure-ratchet
subpatterns:
  - C1.service-capsule
  - C2.persistent-tick
  - C5.failure-ratchet
composes_with:
  - T2R1.bluetooth-audio-gateway
  - T3C1.edge-appliance-bundle
lifecycle:
  managed: false
  install_modes:
    - dry_run
    - apply
  doctor_modes:
    - mock
  rollback: documented
  uninstall: documented
  update: none
artifacts:
  units:
    - units/example.service
    - units/muster-reconnect@.service
    - units/muster-reconnect.timer
  scripts:
    - scripts/reconnect.sh
    - scripts/install.sh
    - scripts/doctor.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: usable
  docs: reviewed
  tests: reviewed
