id: T2C3.scheduled-herald
name: Scheduled Herald
tech_level: 2
rarity: common
mrl: 8
summary: >
  Periodically collect machine status and publish it as a runtime file, MOTD source, API payload, or notification.
provides:
  - scheduled_status_report
requires:
  - C1.service-capsule
  - C2.persistent-tick
  - C5.failure-ratchet
subpatterns:
  - C1.service-capsule
  - C2.persistent-tick
  - C5.failure-ratchet
composes_with:
  - T3C1.edge-appliance-bundle
lifecycle:
  managed: false
  install_modes:
    - dry_run
    - apply
  doctor_modes:
    - mock
  rollback: documented
  uninstall: documented
  update: none
artifacts:
  units:
    - units/example.service
    - units/muster-herald.service
    - units/muster-herald.timer
  scripts:
    - scripts/collect-status.sh
    - scripts/install.sh
    - scripts/doctor.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: usable
  docs: reviewed
  tests: reviewed
