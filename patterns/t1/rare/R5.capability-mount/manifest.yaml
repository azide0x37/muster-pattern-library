id: R5.capability-mount
name: Capability Mount
tech_level: 1
rarity: rare
mrl: 5
summary: >
  Treat access to a resource such as NAS, secrets, cameras, or media as a capability with explicit ownership.
provides:
  - resource_capability
requires:
  - systemd.mount
  - credentials
subpatterns:[]
composes_with:
  - C4.lazy-resource-gate
  - C5.failure-ratchet
lifecycle:
  managed: true
  install_modes:
    - dry_run
    - staged_root
    - apply
  doctor_modes:
    - mock
    - staged_root
  rollback: artifact_generation
  uninstall: artifacts_only
  update: none
artifacts:
  units:
    - units/example.service
    - units/muster-capability@.service
  scripts:
    - scripts/check-capability.sh
    - scripts/install.sh
    - scripts/doctor.sh
    - scripts/rollback.sh
    - scripts/uninstall.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: stable
  docs: stable
  tests: stable
