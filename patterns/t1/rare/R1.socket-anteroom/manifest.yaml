id: R1.socket-anteroom
name: Socket Anteroom
tech_level: 1
rarity: rare
mrl: 7
summary: >
  Expose a local API or control endpoint through socket activation without keeping the backing service hot.
provides:
  - socket_activated_control_plane
requires:
  - systemd.socket
  - systemd.service
subpatterns:[]
composes_with:
  - C1.service-capsule
artifacts:
  units:
    - units/example.service
    - units/muster-anteroom.socket
    - units/muster-anteroom.service
  scripts:
    - scripts/socket-anteroom-serve.sh
    - scripts/install.sh
    - scripts/doctor.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: stable
  docs: stable
  tests: stable
