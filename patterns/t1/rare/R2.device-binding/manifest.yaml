id: R2.device-binding
name: Device Binding
tech_level: 1
rarity: rare
mrl: 6
summary: >
  Attach service lifetime to the presence of a USB, serial, Bluetooth, camera, or other local device.
provides:
  - device_scoped_lifetime
requires:
  - udev
  - systemd.device
  - systemd.service
subpatterns:[]
composes_with:
  - C1.service-capsule
  - C5.failure-ratchet
lifecycle:
  managed: true
  install_modes:
    - dry_run
    - staged_root
    - apply
  doctor_modes:
    - mock
    - staged_root
  rollback: artifact_generation
  uninstall: artifacts_only
  update: none
artifacts:
  udev:
    - udev/90-muster-device-binding.rules
  units:
    - units/example.service
    - units/muster-device-bound@.service
  scripts:
    - scripts/device-bound-run.sh
    - scripts/install.sh
    - scripts/doctor.sh
    - scripts/rollback.sh
    - scripts/uninstall.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: stable
  docs: stable
  tests: stable
