rarity: common
mrl: 8
summary: >
  React to files appearing in a watched folder and hand them to a safe processing service.
provides:
  - filesystem_event_processing
requires:
  - systemd.path
  - systemd.service
subpatterns:[]
composes_with:
  - C1.service-capsule
  - C5.failure-ratchet
artifacts:
