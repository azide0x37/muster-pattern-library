id: T3C1.edge-appliance-bundle
name: Edge Appliance Bundle
tech_level: 3
rarity: common
mrl: 7
summary: >
  Turn a Raspberry Pi or similar host into a respectable local appliance with storage, status, recovery, and sidecar behavior.
provides:
  - local_appliance
  - health_report
  - recoverable_runtime
requires:
  - T2C1.hot-cold-nas-conveyor
  - T2C3.scheduled-herald
  - T2C4.self-healing-reconnector
  - T2C5.local-sidecar-bridge
subpatterns:
  - T2C1.hot-cold-nas-conveyor
  - T2C3.scheduled-herald
  - T2C4.self-healing-reconnector
  - T2C5.local-sidecar-bridge
composes_with:
  - T3R1.multi-resource-orchestrator
  - T3M1.machine-priest
artifacts:
  units:
    - units/example.service
    - units/muster-appliance.target
    - units/muster-recover@.service
  scripts:
    - scripts/appliance-doctor.sh
    - scripts/muster-recover.sh
    - scripts/install.sh
    - scripts/doctor.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: usable
  docs: reviewed
  tests: reviewed
