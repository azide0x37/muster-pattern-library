  - TR1.bluetooth-audio-gateway
  - TR2.lazy-capability-media-bus
  - TR3.edge-control-plane
  - R2.device-binding
  - R4.state-ledger
subpatterns:
  - T3C1.edge-appliance-bundle
  - TR1.bluetooth-audio-gateway
  - TR2.lazy-capability-media-bus
  - TR3.edge-control-plane
  - R2.device-binding
  - R4.state-ledger
composes_with:
  - T3M1.machine-priest
artifacts:
  units:
    - units/example.service
  scripts:
    - scripts/install.sh
    - scripts/doctor.sh
  tests:
    - tests/test_manifest.py
  examples:
    - examples/minimal/README.md
status:
  implementation: draft
  docs: draft
  tests: draft
